<!DOCTYPE html>
<html lang="ro">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dobble</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    body {
      background: #bd86ed;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      gap: 15px;
    }

    h1 {
      font-size: 2rem;
      margin: 0;
    }

    .players {
      display: flex;
      gap: 20px;
    }

    .player-input {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    label {
      font-size: 12px;
      opacity: 0.6;
    }

    input[type="text"] {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      padding: 6px 10px;
      color: white;
      width: 150px;
    }

    #mesaj {
      font-size: 14px;
      opacity: 0.7;
      height: 20px;
    }
  </style>
</head>

<body>
  <h1>🎲 Dobble</h1>
  <div class="players">
    <div class="player-input">
      <label>Jucător 1</label>
      <div style="display:flex; gap:6px; align-items:center">
        <input id="p1Name" type="text" placeholder="Numele tău..." maxlength="16" />
        <input id="p1Color" type="color" value="#F4D03F" />
      </div>
    </div>
    <div class="player-input">
      <label>Jucător 2</label>
      <div style="display:flex; gap:6px; align-items:center">
        <input id="p2Name" type="text" placeholder="Numele tău..." maxlength="16" />
        <input id="p2Color" type="color" value="#E63946" />
      </div>
    </div>
  </div>
  
  <div id="canvasContainer"></div>
  <div id="mesaj"></div>

  <script type="module" src="./main.js"></script>
</body>

</html>
