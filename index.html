<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dobble</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<style>
* { box-sizing: border-box; }
body {
  background: #bd86ed; color: white; font-family: Arial, sans-serif;
  display: flex; flex-direction: column; align-items: center;
  padding: 20px; gap: 15px; margin: 0;
}
h1 { font-size: 2rem; margin: 0; }
 
.top-row {
  display: flex; gap: 20px; align-items: flex-end; flex-wrap: wrap; justify-content: center;
}
.player-input { display: flex; flex-direction: column; gap: 4px; }
label { font-size: 12px; opacity: 0.6; }
input[type="text"] {
  background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
  border-radius: 8px; padding: 6px 10px; color: white; width: 150px;
}
input[type="text"]::placeholder { color: rgba(255,255,255,0.4); }
 

.mod-joc {
  display: flex; flex-direction: column; gap: 6px; align-items: center;
}
.mod-joc > label { font-size: 12px; opacity: 0.6; }
 
.mod-tabs {
  display: flex; gap: 0; background: rgba(0,0,0,0.2);
  border-radius: 10px; overflow: hidden;
}
.mod-tabs button {
  background: transparent; border: none; color: rgba(255,255,255,0.6);
  padding: 6px 13px; font-size: 13px; cursor: pointer; transition: all .2s;
  font-family: Arial, sans-serif;
}
.mod-tabs button.activ {
  background: rgba(255,255,255,0.25); color: white; font-weight: bold;
}
.mod-tabs button:hover:not(.activ) { background: rgba(255,255,255,0.1); }
 
#p2Wrap { transition: opacity .2s; }
 
#mesaj {
  font-size: 14px; opacity: 0.85; min-height: 22px;
  background: rgba(0,0,0,0.15); border-radius: 8px;
  padding: 2px 12px; text-align: center;
}
</style>
</head>
<body>
<h1>🎲 Dobble</h1>
 
<div class="top-row">
  
  <div class="player-input">
    <label>Jucător 1</label>
    <div style="display:flex; gap:6px; align-items:center">
      <input id="p1Name" type="text" placeholder="Numele tău..." maxlength="16" />
      <input id="p1Color" type="color" value="#F4D03F" />
    </div>
  </div>
 
  
  <div class="mod-joc">
    <label>Mod joc</label>
    <div class="mod-tabs">
      <button id="mod2p"     class="activ"  onclick="selectMod('2p')">👥 2P</button>
      <button id="modEasy"               onclick="selectMod('easy')">🤖 Easy</button>
      <button id="modMedium"             onclick="selectMod('medium')">🧠 Medium</button>
    </div>
  </div>
 
  
  <div class="player-input" id="p2Wrap">
    <label>Jucător 2</label>
    <div style="display:flex; gap:6px; align-items:center">
      <input id="p2Name" type="text" placeholder="Numele tău..." maxlength="16" />
      <input id="p2Color" type="color" value="#E63946" />
    </div>
  </div>
</div>
 
<div id="canvasContainer"></div>
<div id="mesaj"></div>
 
<script type="module" src="./main.js"></script>
 
<script>
  window._modJoc = '2p';
 
  function selectMod(mod) {
    window._modJoc = mod;
    document.querySelectorAll('.mod-tabs button').forEach(b => b.classList.remove('activ'));
    document.getElementById(
      mod === '2p' ? 'mod2p' : mod === 'easy' ? 'modEasy' : 'modMedium'
    ).classList.add('activ');
 
    const p2Wrap = document.getElementById('p2Wrap');
    if (mod === '2p') {
      p2Wrap.style.opacity = '1';
      p2Wrap.style.pointerEvents = 'auto';
    } else {
      p2Wrap.style.opacity = '0.35';
      p2Wrap.style.pointerEvents = 'none';
      document.getElementById('p2Name').value = '';
    }
  }
 
  window.selectMod = selectMod;
</script>
</body>
</html>
